<svg width="800" height="800" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .rotating {
<!--            animation: rotate 5s linear infinite;-->
            transform-origin: 100px 100px;
<!--            transform: rotate(45deg);-->
            }

            @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
            }
        </style>

        <!-- Glow Filter -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
<!--            <feGaussianBlur stdDeviation="1" result="coloredBlur"/>-->
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <!-- Light Stroke Gradient -->
        <linearGradient id="lightLine" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFBB44" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#FFD580" stop-opacity="0.2"/>
        </linearGradient>
    </defs>

    <g class="rotating">
        <!-- Lines Going Into Center Gear -->
        <line x1="100" y1="70" x2="100.0001" y2="90" stroke="url(#lightLine)" stroke-width="1"/>
        <line x1="100" y1="70" x2="100.0001" y2="90" stroke="url(#lightLine)" stroke-width="1" stroke-dasharray="2,2"/>

        <line x1="130" y1="100" x2="110" y2="100.0001" stroke="url(#lightLine)" stroke-width="1"/>
        <line x1="110.0001" y1="100.0001" x2="130" y2="100" stroke="url(#lightLine)" stroke-width="1" stroke-dasharray="2,2"/>

        <line x1="100" y1="130" x2="100.0001" y2="110" stroke="url(#lightLine)" stroke-width="1"/>
        <line x1="100" y1="110.0001" x2="100.0001" y2="130" stroke="url(#lightLine)" stroke-width="1" stroke-dasharray="2,2"/>

        <line x1="70" y1="100" x2="90" y2="100.0001" stroke="url(#lightLine)" stroke-width="1"/>
        <line x1="70" y1="100.0001" x2="90" y2="100" stroke="url(#lightLine)" stroke-width="1" stroke-dasharray="2,2"/>

        <!-- Diagonal Cross Lines -->

        <!-- Glowing Outer Nodes -->
        <circle cx="100" cy="70" r="6" fill="#FFAA33" filter="url(#glow)"/>
        <circle cx="130" cy="100" r="6" fill="#FFAA33" filter="url(#glow)"/>
        <circle cx="100" cy="130" r="6" fill="#FFAA33" filter="url(#glow)"/>
        <circle cx="70" cy="100" r="6" fill="#FFAA33" filter="url(#glow)"/>
    </g>
    <defs>
    <!-- Center Gear -->
        <mask id="gearMask">
        <!-- Everything visible -->
        <rect width="200" height="200" fill="white"/>
        <!-- Fully visible background -->
        <g transform="translate(12.5, 12.5) scale(0.5)">
            <path d="
        M25 5
        L30 7
        L35 7
        L37 12
        L42 15
        L42 20
        L45 25
        L42 30
        L42 35
        L37 38
        L35 43
        L30 43
        L25 45
        L20 43
        L15 43
        L13 38
        L8 35
        L8 30
        L5 25
        L8 20
        L8 15
        L13 12
        L15 7
        L20 7
        Z" fill="Black"/>
        </g>
    </mask>
    </defs>
    <g transform="translate(75, 75)">
        <path d="
        M25 5
        L30 7
        L35 7
        L37 12
        L42 15
        L42 20
        L45 25
        L42 30
        L42 35
        L37 38
        L35 43
        L30 43
        L25 45
        L20 43
        L15 43
        L13 38
        L8 35
        L8 30
        L5 25
        L8 20
        L8 15
        L13 12
        L15 7
        L20 7
        Z" fill="#FFAA33" filter="url(#glow)" mask="url(#gearMask)"/>
    </g>
</svg>
